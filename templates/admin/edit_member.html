{% extends "admin/base.html" %}

{% block admin_title %}Edit Member – {{ user.name }}{% endblock %}

{% block admin_content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white d-flex align-items-center justify-content-between">
                <h5 class="mb-0">Edit Member</h5>
                <a href="{{ url_for('admin_members') }}" class="btn btn-sm btn-light">← Back to Members</a>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('admin_edit_member', id=user.id) }}">

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Full Name *</label>
                        <input type="text" name="name" class="form-control" required value="{{ user.name }}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email Address *</label>
                        <input type="email" name="email" class="form-control" required value="{{ user.email }}">
                        <div class="form-text">This is also the member's login address.</div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Organization *</label>
                        <input type="text" name="organization" class="form-control" required value="{{ user.organization }}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Stakeholder Type</label>
                        <select name="stakeholder_type" class="form-select">
                            {% for stype in stakeholder_types %}
                            <option value="{{ stype }}" {% if user.stakeholder_type == stype %}selected{% endif %}>{{ stype }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Country</label>
                        <input type="text" name="country" class="form-control" value="{{ user.country }}">
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                        <a href="{{ url_for('admin_members') }}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
