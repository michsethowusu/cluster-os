{% extends "base.html" %}

{% block title %}Login - AU ECED-FLN Cluster{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card shadow">
                <div class="card-body p-5">
                    <h3 class="text-center mb-4">Member Login</h3>
                    <p class="text-muted text-center mb-4">Enter your email to receive a one-time password</p>
                    
                    <form method="POST" action="{{ url_for('login') }}">
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" name="email" class="form-control form-control-lg" required 
                                   placeholder="you@organization.org">
                        </div>
                        <button type="submit" class="btn btn-primary w-100 btn-lg">
                            Send OTP
                        </button>
                    </form>
                    
                    <hr class="my-4">
                    
                    <p class="text-center text-muted mb-0">
                        Not a member? <a href="{{ url_for('register') }}">Request Access</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
