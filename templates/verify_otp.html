{% extends "base.html" %}

{% block title %}Verify OTP - AU ECED-FLN Cluster{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card shadow">
                <div class="card-body p-5">
                    <h3 class="text-center mb-4">Verify Your OTP</h3>
                    <p class="text-muted text-center mb-4">Enter the 6-digit OTP sent to <strong>{{ email }}</strong></p>
                    
                    <form method="POST" action="{{ url_for('verify_otp') }}">
                        <input type="hidden" name="email" value="{{ email }}">
                        <div class="mb-3">
                            <input type="text" name="otp" class="form-control form-control-lg text-center" 
                                   placeholder="000000" maxlength="6" pattern="\d{6}" required
                                   style="letter-spacing: 10px; font-size: 2rem;">
                        </div>
                        <button type="submit" class="btn btn-primary w-100 btn-lg">
                            Verify OTP
                        </button>
                    </form>
                    
                    <p class="text-center text-muted mt-3 small">
                        Didn't receive it? <a href="{{ url_for('login') }}">Try again</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
